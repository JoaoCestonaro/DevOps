<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cursos</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
            color: #333;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        h3 a {
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            transition: 0.3s;
        }

        h3 a:hover {
            background-color: #45a049;
        }

        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        a[href*="editar"] {
            background-color: #3498db;
            color: white;
        }

        a[href*="editar"]:hover {
            background-color: #2980b9;
        }

        a[href*="excluir"] {
            background-color: #e74c3c;
            color: white;
        }

        a[href*="excluir"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <h1>Lista de Cursos</h1>

    <h3>
        <a href="/cursos/criar">+ Criar novo curso</a>
    </h3>

    <table>
        <tr>
            <th>Nome</th>
            <th>Período</th>
            <th>Carga Horária</th>
            <th colspan="2">Ações</th>
        </tr>

        <tr th:each="curso : ${cursos}">
            <td th:text="${curso.nomeCurso}">*</td>
            <td th:text="${curso.periodoCurso}">*</td>
            <td th:text="${curso.cargaHoraria}">*</td>
            <td>
                <a th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}">Editar</a>
            </td>
            <td>
                <a th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}"
                   onClick="return confirm('Deseja realmente excluir esse curso?')">
                   Excluir
                </a>
            </td>
        </tr>
    </table>

</body>
</html>
